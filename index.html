<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Warriors - 2D RPG</title>
    <style>
        /* ==========================================
           [UI/CSS] STYLES
           ========================================== */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Roboto', sans-serif; user-select: none;
        }

        #gameCanvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated; 
        }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }

        /* --- Màn hình Login --- */
        #loginScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
            display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100;
        }
        .login-box {
            background: rgba(20, 20, 25, 0.95); border: 4px solid #4a148c; padding: 30px; border-radius: 12px;
            text-align: center; color: white; width: 380px;
            box-shadow: 0 0 30px rgba(106, 27, 154, 0.6), inset 0 0 20px rgba(0,0,0,0.8);
        }
        .login-box h1 { font-family: 'Press Start 2P', cursive; font-size: 18px; margin-bottom: 25px; color: #ffeb3b; text-shadow: 2px 2px 0px #f44336; }
        
        .preview-container {
            width: 100%; height: 120px; background: rgba(0,0,0,0.5); border: 2px inset #555;
            border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;
        }
        #previewCanvas { width: 100px; height: 100px; image-rendering: pixelated; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #bbb; font-weight: bold;}
        .input-group input, .input-group select {
            width: 100%; padding: 12px; box-sizing: border-box; font-weight: bold;
            background: #111; border: 2px solid #555; color: white; border-radius: 6px; outline: none; transition: 0.2s;
        }
        
        .race-preview {
            background: rgba(255,255,255,0.05); border: 1px solid #7e57c2; padding: 14px; border-radius: 8px;
            margin-bottom: 16px; text-align: left; line-height: 1.4; font-size: 13px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .race-preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}
        .race-preview-label { font-size: 11px; color: #9e9e9e; text-transform: uppercase; letter-spacing: 1px; }
        .race-preview-name { font-weight: bold; color: #ffeb3b; font-family: 'Press Start 2P', cursive; font-size: 10px;}
        .race-preview-desc { color: #ddd; margin-bottom: 10px; font-size: 12px; font-style: italic;}
        .race-preview-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; font-size: 12px;}
        .race-preview-stats div { color: #eee; }
        .race-preview-stats strong { color: #4fc3f7; }
        .race-preview-skill { margin-top: 10px; border-top: 1px dashed #555; padding-top: 10px; }
        .race-preview-skill-name { color: #b2ff59; font-weight: bold; margin-bottom: 4px; font-size: 12px;}

        .btn-start, .btn-action {
            background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%); color: white; border: 2px solid #1b5e20;
            padding: 15px 20px; font-weight: bold; width: 100%; border-radius: 6px; text-shadow: 1px 1px 2px black;
            cursor: pointer; transition: 0.1s; font-family: 'Press Start 2P', cursive; font-size: 12px; box-shadow: 0 4px 0 #1b5e20; margin-bottom: 5px;
        }
        .btn-start:active, .btn-action:active { transform: translateY(4px); box-shadow: 0 0 0 #1b5e20; }
        .btn-load { background: linear-gradient(180deg, #2196f3 0%, #1565c0 100%); border-color: #0d47a1; box-shadow: 0 4px 0 #0d47a1; }
        .btn-load:active { box-shadow: 0 0 0 #0d47a1; }

        /* --- HUD --- */
        #hud { display: none; pointer-events: auto; }
        .player-stats {
            position: absolute; top: 15px; left: 15px;
            background: rgba(20,20,30,0.85); padding: 12px; border-radius: 4px;
            border: 2px solid #8d6e63; width: 260px; color: white; box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        .level-info { font-weight: bold; margin-bottom: 8px; text-shadow: 1px 1px 0px black; font-size: 14px; border-bottom: 1px solid #555; padding-bottom: 5px;}
        .stat-bar-container { width: 100%; background: #222; height: 14px; margin: 2px 0 6px 0; border: 2px solid #111; position: relative;}
        .stat-bar { height: 100%; transition: width 0.1s; }
        .stat-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 10px; line-height: 14px; font-weight: bold; text-shadow: 1px 1px 1px black; z-index: 2;}
        #hpBar { background: linear-gradient(90deg, #d32f2f, #f44336); width: 100%; }
        #mpBar { background: linear-gradient(90deg, #1976d2, #2196f3); width: 100%; }
        #expBar { background: linear-gradient(90deg, #fbc02d, #ffeb3b); width: 0%; }
        
        /* Map Info */
        #mapInfo {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); border: 2px solid #555; padding: 5px 20px;
            color: #fff; font-family: 'Press Start 2P', cursive; font-size: 12px; border-radius: 20px; text-shadow: 1px 1px 0 #000;
        }

        #questTracker {
            position: absolute; top: 15px; right: 15px; background: rgba(20,20,30,0.85); padding: 10px 15px; border-radius: 4px;
            border: 2px solid #8d6e63; width: 200px; color: white; text-align: right; box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        #questTracker h3 { margin: 0 0 5px 0; font-size: 14px; color: #ffca28; }
        #questText { font-size: 12px; color: #fff; }

        /* Skill Bar (Mới) */
        #skillBar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px; border: 2px solid #444; pointer-events: auto;
        }
        .skill-slot {
            width: 40px; height: 40px; background: #333; border: 2px solid #777; border-radius: 4px;
            display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; position: relative;
        }
        .skill-key { position: absolute; top: -8px; right: -8px; background: #ffca28; color: black; font-size: 10px; padding: 2px 4px; border-radius: 4px; border: 1px solid #000;}

        #chatBox {
            position: absolute; bottom: 15px; left: 15px; width: 320px; background: rgba(0,0,0,0.6); border-radius: 4px; display: flex; flex-direction: column; border: 2px solid #555; pointer-events: auto;
        }
        #chatMessages { height: 150px; overflow-y: auto; padding: 10px; color: white; font-size: 13px; text-shadow: 1px 1px 1px black; display: flex; flex-direction: column; gap: 6px; }
        #chatInput { background: rgba(0,0,0,0.8); border: none; border-top: 2px solid #555; color: white; padding: 10px; outline: none;}
        .msg-sys { color: #ffeb3b; font-style: italic;}
        .msg-name { font-weight: bold; color: #4caf50; }

        #inventory {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30,30,35,0.95); border: 4px solid #8d6e63; padding: 20px; border-radius: 8px;
            width: 300px; color: white; pointer-events: auto; box-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 50;
        }
        .inv-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 2px solid #555; padding-bottom: 10px;}
        .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .item-slot { width: 100%; aspect-ratio: 1; background: #222; border: 2px solid #555; cursor: pointer; position: relative;}
        .item-slot:hover { border-color: #ffeb3b; }
        .item-count { position: absolute; bottom: 2px; right: 4px; font-size: 11px; font-weight: bold; }
        .tooltip { visibility: hidden; width: 120px; background: rgba(0,0,0,0.9); color: #fff; text-align: center; border-radius: 6px; padding: 5px; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); font-size: 11px; z-index: 10;}
        .item-slot:hover .tooltip { visibility: visible; }

        #respawnScreen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(100,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 200;
        }
        #respawnScreen h1 { font-family: 'Press Start 2P', cursive; color: #ff5252; text-shadow: 3px 3px 0 #000; margin-bottom: 20px;}

        #systemMessage {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            color: #ffeb3b; font-size: 16px; font-weight: bold; text-shadow: 2px 2px 2px #000;
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }

        .screen-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white;
            opacity: 0; pointer-events: none; z-index: 50; transition: opacity 0.1s;
        }
    </style>
</head>
<body>

    <!-- Render Engine -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div class="ui-layer" id="uiLayer">
        <div id="screenFlash" class="screen-flash"></div>
        <div id="systemMessage">Thông báo hệ thống</div>
        
        <!-- Login -->
        <div id="loginScreen">
            <div class="login-box">
                <h1>AURA WARRIORS</h1>
                <div class="preview-container"><canvas id="previewCanvas"></canvas></div>
                <div class="input-group">
                    <label>Tên nhân vật</label>
                    <input type="text" id="playerNameInput" placeholder="Nhập tên..." value="Gamer" maxlength="12">
                </div>
                <div class="input-group">
                    <label>Chủng tộc</label>
                    <select id="playerRaceInput">
                        <option value="sayan">Sayan</option>
                        <option value="namek">Namek</option>
                        <option value="earth">Trái Đất</option>
                    </select>
                </div>
                <div class="race-preview" id="racePreview">
                    <div class="race-preview-header">
                        <div class="race-preview-label">Thông tin</div>
                        <div id="racePreviewName" class="race-preview-name">Sayan</div>
                    </div>
                    <div class="race-preview-stats">
                        <div><strong>HP:</strong> <span id="raceHp">180</span></div>
                        <div><strong>MP:</strong> <span id="raceMp">70</span></div>
                        <div><strong>DMG:</strong> <span id="raceDamage">22</span></div>
                        <div><strong>SPD:</strong> <span id="raceSpeed">5.5</span></div>
                    </div>
                    <div class="race-preview-skill">
                        <div id="racePreviewSkillName" class="race-preview-skill-name">Thịnh nộ Sayan</div>
                    </div>
                </div>
                <button class="btn-start" onclick="GameCore.startNewGame()">VÀO GAME MỚI</button>
                <button class="btn-action btn-load" onclick="GameCore.loadGame()">TIẾP TỤC (TẢI LẠI)</button>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="player-stats">
                <div class="level-info"><span id="hudName">Player</span> <span style="float:right; color:#ffeb3b">Lv.<span id="hudLevel">1</span></span></div>
                <div class="stat-bar-container"><div class="stat-bar" id="hpBar"></div><div class="stat-text">HP: <span id="hudHpText">100/100</span></div></div>
                <div class="stat-bar-container"><div class="stat-bar" id="mpBar"></div><div class="stat-text">MP: <span id="hudMpText">50/50</span></div></div>
                <div class="stat-bar-container" style="height: 8px;"><div class="stat-bar" id="expBar"></div></div>
                <div class="money-info">🪙 <span id="hudMoney">0</span> Vàng</div>
            </div>

            <div id="mapInfo">Làng Khởi Đầu</div>

            <div id="questTracker">
                <h3>Nhiệm vụ</h3>
                <div id="questText">Nói chuyện Trưởng Làng</div>
            </div>

            <!-- Skill Bar (Mới) -->
            <div id="skillBar">
                <div class="skill-slot">J<div class="skill-key">Đánh</div></div>
                <div class="skill-slot" style="background:#1565c0">K<div class="skill-key">Khí</div></div>
                <div class="skill-slot" style="background:#ff8f00">Q<div class="skill-key">Skill</div></div>
                <div class="skill-slot" style="background:#4caf50">I<div class="skill-key">Túi</div></div>
            </div>

            <div id="chatBox">
                <div id="chatMessages"></div>
                <input type="text" id="chatInput" placeholder="Nhấn Enter để chat...">
            </div>
        </div>

        <!-- Inventory -->
        <div id="inventory">
            <div class="inv-header"><h2>HÀNH TRANG</h2><button class="close-btn" onclick="UI.toggleInventory()">X</button></div>
            <div class="item-grid" id="invGrid"></div>
        </div>

        <!-- Respawn Screen -->
        <div id="respawnScreen">
            <h1>BẠN ĐÃ BỊ HẠ GỤC</h1>
            <button class="btn-start" style="width: 200px;" onclick="GameCore.respawnPlayer()">HỒI SINH TẠI LÀNG</button>
        </div>

    </div>

<script>
/* =========================================================================
   [CONFIG] THÔNG SỐ GAME (config/races.js, config/animations.js)
   ========================================================================= */
const CONFIG = {
    gravity: 0.6, friction: 0.8, maxFall: 15,
    races: {
        sayan: {
            title: 'Sayan', maxHp: 180, maxMp: 70, baseDamage: 22, speed: 5.5, jumpForce: -12, maxExp: 110,
            levelGrowth: { hp: 28, mp: 8, damage: 6, expFactor: 1.35 },
            // Bảng màu chuẩn theo ảnh Pixel Art Goku
            colors: { aura: 'rgba(255,235,59,0.4)', body: '#f47b16', hair: '#111111', skin: '#fcdcb6', outfit: '#f47b16', accent: '#0074c7', proj: '#ffeb3b' },
            skill: { name: 'Thịnh nộ Sayan', cost: 20, cd: 8000, duration: 3000 }
        },
        namek: {
            title: 'Namek', maxHp: 140, maxMp: 120, baseDamage: 16, speed: 4.8, jumpForce: -11, maxExp: 100,
            levelGrowth: { hp: 18, mp: 18, damage: 4, expFactor: 1.25 },
            // Bảng màu chuẩn Piccolo
            colors: { aura: 'rgba(0,255,128,0.3)', body: '#4a148c', hair: '#2e7d32', skin: '#81c784', outfit: '#4a148c', accent: '#ff1744', proj: '#00e5ff' },
            skill: { name: 'Hồi phục & Khiên', cost: 30, cd: 10000, duration: 4000 }
        },
        earth: {
            title: 'Trái Đất', maxHp: 150, maxMp: 80, baseDamage: 18, speed: 6.5, jumpForce: -13, maxExp: 95,
            levelGrowth: { hp: 20, mp: 10, damage: 5, expFactor: 1.15 },
            // Bảng màu chuẩn Võ sư
            colors: { aura: 'rgba(0,150,255,0.3)', body: '#d32f2f', hair: '#000000', skin: '#ffe0b2', outfit: '#d32f2f', accent: '#111111', proj: '#80d8ff' },
            skill: { name: 'Bước Nhanh', cost: 15, cd: 9000, duration: 3000 }
        }
    },
    // Chuẩn bị cấu trúc Animation cho Sprite Sheet sau này
    animations: {
        idle: { frames: 4, speed: 200, loop: true },
        run: { frames: 6, speed: 100, loop: true },
        jump: { frames: 1, speed: 1000, loop: false },
        attack: { frames: 3, speed: 100, loop: false },
        shoot: { frames: 3, speed: 100, loop: false },
        hurt: { frames: 2, speed: 100, loop: false },
        dead: { frames: 1, speed: 1000, loop: false }
    }
};

/* =========================================================================
   [CORE] TRẠNG THÁI TOÀN CỤC (src/globals.js)
   ========================================================================= */
const GLOBALS = {
    canvas: document.getElementById('gameCanvas'),
    ctx: document.getElementById('gameCanvas').getContext('2d'),
    width: window.innerWidth, height: window.innerHeight,
    groundY: window.innerHeight - 100,
    state: 'LOGIN', // LOGIN, PLAYING, DEAD
    lastTime: 0,
    camera: { x: 0, y: 0, shakeTime: 0, shakeIntensity: 0 },
    keys: {},
    isChatFocused: false,
    network: null,
    
    // Lists
    player: null,
    entities: [],
    projectiles: [],
    particles: [],
    texts: [],
    
    resize: function() {
        this.width = window.innerWidth; this.height = window.innerHeight;
        this.canvas.width = this.width; this.canvas.height = this.height;
        this.groundY = this.height - 100;
    }
};
window.addEventListener('resize', () => GLOBALS.resize());
GLOBALS.resize();

/* =========================================================================
   [UTILS] CÔNG CỤ HỖ TRỢ (utils/helpers.js)
   ========================================================================= */
const Utils = {
    checkAABB: (r1, r2) => (r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y),
    rand: (min, max) => Math.random() * (max - min) + min,
    spawnText: (x, y, text, color, isCrit = false) => {
        GLOBALS.texts.push({ x, y, text, color, life: 60, maxLife: 60, vy: -2, isCrit });
    },
    spawnParticles: (x, y, color, count) => {
        for(let i=0; i<count; i++) GLOBALS.particles.push({ x, y, vx: Utils.rand(-5,5), vy: Utils.rand(-5,5), life: Utils.rand(10,30), color, size: Utils.rand(2,5) });
    },
    screenShake: (intensity, time) => {
        GLOBALS.camera.shakeIntensity = intensity; GLOBALS.camera.shakeTime = time;
    },
    screenFlash: () => {
        let flash = document.getElementById('screenFlash'); flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 50);
    }
};

/* =========================================================================
   [SYSTEM] BẢN ĐỒ & DI CHUYỂN (systems/MapManager.js)
   ========================================================================= */
const MapManager = {
    currentId: 'village',
    maps: {
        village: { 
            name: 'Làng Khởi Đầu', width: 2500, bgStart: '#0a192f', bgEnd: '#172a45', groundColor: '#2e7d32', dirtColor: '#5d4037',
            portals: [ { x: 2400, target: 'forest', targetX: 100, label: 'Tới Khu Rừng ->' } ],
            spawns: [
                { type: 'npc', x: 400, id: 'truonglang' },
                { type: 'monster', x: 1000, lvl: 1 }, { type: 'monster', x: 1500, lvl: 1 }
            ]
        },
        forest: { 
            name: 'Rừng Quái Vật', width: 3000, bgStart: '#1b5e20', bgEnd: '#003300', groundColor: '#33691e', dirtColor: '#3e2723',
            portals: [ { x: 50, target: 'village', targetX: 2300, label: '<- Về Làng' } ],
            spawns: [
                { type: 'monster', x: 600, lvl: 2 }, { type: 'monster', x: 1200, lvl: 2 }, 
                { type: 'monster', x: 1800, lvl: 3 }, { type: 'monster', x: 2500, lvl: 3 }
            ]
        }
    },
    
    loadMap: function(mapId, spawnX) {
        this.currentId = mapId;
        let mapData = this.maps[mapId];
        document.getElementById('mapInfo').innerText = mapData.name;
        
        // Clear old entities except player
        GLOBALS.entities = GLOBALS.entities.filter(e => e === GLOBALS.player || e.isBot); // Giữ lại Bot mạng ảo
        GLOBALS.projectiles = []; GLOBALS.particles = [];
        
        // Player pos
        if(GLOBALS.player) {
            GLOBALS.player.x = spawnX; GLOBALS.player.y = GLOBALS.groundY - 100;
        }

        // Spawn Map Entities
        mapData.spawns.forEach(s => {
            if(s.type === 'npc') GLOBALS.entities.push(new NPC(s.x, GLOBALS.groundY - 50));
            if(s.type === 'monster') GLOBALS.entities.push(new Monster(s.x, GLOBALS.groundY - 50, s.lvl));
        });

        UI.showCenterMessage(`Khu vực: ${mapData.name}`);
    },

    checkPortals: function() {
        if(!GLOBALS.player || GLOBALS.player.isDead) return;
        let p = this.maps[this.currentId].portals.find(port => Math.abs(GLOBALS.player.x - port.x) < 50);
        if (p && GLOBALS.keys['KeyW']) { // Bấm W (Lên) để vào cổng
            this.loadMap(p.target, p.targetX);
            GLOBALS.keys['KeyW'] = false; // Reset key
        }
    },

    drawBackground: function(ctx, camX, camY) {
        let mapData = this.maps[this.currentId];
        let grad = ctx.createLinearGradient(0, 0, 0, GLOBALS.height);
        grad.addColorStop(0, mapData.bgStart); grad.addColorStop(1, mapData.bgEnd);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, GLOBALS.width, GLOBALS.height);
        
        ctx.save(); ctx.translate(-camX, -camY);
        
        // Cổng Portal
        mapData.portals.forEach(p => {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.fillRect(p.x, GLOBALS.groundY - 80, 60, 80);
            ctx.fillStyle = 'white'; ctx.font = '10px Roboto'; ctx.fillText(p.label, p.x, GLOBALS.groundY - 90);
        });

        // Mặt đất
        ctx.fillStyle = mapData.groundColor; ctx.fillRect(0, GLOBALS.groundY, mapData.width, 20);
        ctx.fillStyle = mapData.dirtColor; ctx.fillRect(0, GLOBALS.groundY + 20, mapData.width, GLOBALS.height - GLOBALS.groundY);
        
        // Trang trí cảnh vật
        ctx.fillStyle = (this.currentId === 'forest') ? '#113311' : '#1b5e20';
        for (let i = 100; i < mapData.width; i += 400) {
            ctx.fillRect(i, GLOBALS.groundY - 60, 15, 60); // Thân cây
            ctx.beginPath(); ctx.arc(i + 7, GLOBALS.groundY - 70, 35, 0, Math.PI * 2); ctx.fill(); // Tán lá
        }
        ctx.restore();
    }
};

/* =========================================================================
   [SYSTEM] QUẢN LÝ ANIMATION & RENDERER (renderer/AnimationManager.js)
   ========================================================================= */
const AnimationManager = {
    // Hàm này sẽ dùng cho Sprite sau này. Hiện tại dùng để xác định State cho CharacterRenderer
    updateState: function(char, dt) {
        if(char.isDead) { char.state = 'dead'; return; }
        
        char.animTimer += dt;
        let config = CONFIG.animations[char.state];
        if (char.animTimer > config.speed) {
            char.animTimer = 0;
            char.animFrame++;
            if (char.animFrame >= config.frames) {
                if (config.loop) char.animFrame = 0;
                else {
                    // Reset to idle sau khi xong animation 1 lần (như attack, shoot)
                    char.state = 'idle'; char.animFrame = 0;
                }
            }
        }
    }
};

const CharacterRenderer = {
    // Helper vẽ khối vuông có viền (Phong cách Pixel/Lego)
    drawBlock: function(ctx, x, y, w, h, fill, noStroke = false) {
        ctx.fillStyle = fill;
        ctx.fillRect(x, y, w, h);
        if (!noStroke) ctx.strokeRect(x, y, w, h);
    },

    // Helper vẽ tứ chi (Tay, Chân) có khớp và băng đeo
    drawLimb: function(ctx, x, y, w, h, rot, color, accentColor, isLeg = false) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        this.drawBlock(ctx, -w/2, 0, w, h, color); // Cánh tay/Đùi
        
        // Vẽ băng cổ tay hoặc đôi giày mập mạp
        if (accentColor) {
            if (isLeg) {
                // Giày to hơn ống chân
                this.drawBlock(ctx, -w/2 - 2, h - 8, w + 4, 8, accentColor);
                this.drawBlock(ctx, -w/2 - 2, h, w + 6, 4, '#ffeb3b'); // Mũi giày vàng
            } else {
                // Băng cổ tay
                this.drawBlock(ctx, -w/2 - 1, h - 6, w + 2, 6, accentColor);
                this.drawBlock(ctx, -w/2, h, w, 4, color); // Bàn tay
            }
        }
        ctx.restore();
    },

    draw: function(ctx, char) {
        ctx.save();
        ctx.translate(char.x + char.width / 2, char.y + char.height);
        ctx.scale(char.dir, 1); // Lật theo hướng

        // Setup nét vẽ đậm chất Pixel Art
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#000';
        ctx.lineJoin = 'miter'; // Nét gập góc cạnh
        ctx.lineCap = 'square';

        if (char.hurtTimer > 0) ctx.globalAlpha = (Math.floor(Date.now() / 50) % 2 === 0) ? 0.5 : 1;

        // Tính toán dao động Animation
        let time = Date.now(); let bobY = 0, legRot = 0, armRot = 0;
        if (char.state === 'idle') bobY = Math.floor(Math.sin(time / 200) * 2);
        else if (char.state === 'run') { bobY = Math.floor(Math.abs(Math.sin(time / 100)) * 4); legRot = Math.sin(time / 80) * 0.8; armRot = -legRot; }
        else if (char.state === 'jump') { legRot = 0.5; armRot = -0.8; }
        else if (char.state === 'dead') { ctx.rotate(Math.PI / 2); ctx.translate(-char.height / 2 + 10, -char.width / 2); }

        // Kích thước chuẩn Pixel (Tỷ lệ y như ảnh mẫu)
        const headS = 20, bodyW = 18, bodyH = 16, limbW = 8, limbH = 14;
        let waistY = -24; // Vị trí eo
        
        let cSkin = char.colors.skin;
        let cPants = char.colors.outfit;
        let cAccent = char.colors.accent || '#000';
        let isSuper = char.skillActive && char.raceKey === 'sayan';
        let cHair = isSuper ? '#ffeb3b' : char.colors.hair;

        // Vẽ Aura bùng nổ xung quanh
        if (char instanceof Player && !char.isDead && (char.state === 'attack' || char.state === 'shoot' || char.skillActive)) {
            ctx.beginPath();
            let auraSize = char.skillActive ? 50 : 35; let pulse = Math.floor(Math.sin(time / 50) * 5);
            ctx.moveTo(0, waistY - bodyH - headS - 10 - pulse);
            ctx.quadraticCurveTo(auraSize, waistY - bodyH, 0, 10);
            ctx.quadraticCurveTo(-auraSize, waistY - bodyH, 0, waistY - bodyH - headS - 10 - pulse);
            ctx.fillStyle = char.colors.aura; ctx.fill();
        }

        // --- 1. TAY TRONG (Tay khuất phía sau) ---
        this.drawLimb(ctx, -bodyW/2 + 2, waistY - bodyH + 2 + bobY, limbW, limbH, armRot, cSkin, cAccent, false);

        // --- 2. HAI CHÂN ---
        this.drawLimb(ctx, -5, waistY + bobY, limbW+2, limbH, legRot, cPants, cAccent, true); // Quần phồng
        this.drawLimb(ctx, 5, waistY + bobY, limbW+2, limbH, -legRot, cPants, cAccent, true);

        // --- 3. THÂN (Ngực trần cho Sayan) ---
        let chestColor = (char.raceKey === 'sayan') ? cSkin : cPants;
        this.drawBlock(ctx, -bodyW/2, waistY - bodyH + bobY, bodyW, bodyH, chestColor);
        // Vẽ cơ ngực cho Sayan
        if (char.raceKey === 'sayan') {
            ctx.beginPath(); ctx.moveTo(-bodyW/2 + 2, waistY - bodyH/2 + bobY); ctx.lineTo(bodyW/2 - 2, waistY - bodyH/2 + bobY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, waistY - bodyH + 2 + bobY); ctx.lineTo(0, waistY - bodyH/2 + bobY); ctx.stroke();
        }

        // --- 4. ĐAI LƯNG ---
        this.drawBlock(ctx, -bodyW/2 - 2, waistY - 2 + bobY, bodyW + 4, 6, cAccent);
        // Tà đai thòng xuống
        this.drawBlock(ctx, -4, waistY + 4 + bobY, 6, 8, cAccent);

        // --- 5. TAY NGOÀI ---
        let frontArmRot = -armRot;
        if (char.state === 'attack' || char.state === 'shoot') frontArmRot = -Math.PI / 1.5;
        this.drawLimb(ctx, bodyW/2 - 2, waistY - bodyH + 2 + bobY, limbW, limbH, frontArmRot, cSkin, cAccent, false);

        // --- 6. ĐẦU VÀ KHUÔN MẶT BLOCKY ---
        let hy = waistY - bodyH - headS + bobY;
        this.drawBlock(ctx, -headS/2, hy, headS, headS, cSkin); // Khuôn mặt vuông vức
        
        // Mắt Pixel
        ctx.fillStyle = '#000';
        if (char.state === 'attack' || char.state === 'shoot') {
            // Mắt xếch giận dữ
            ctx.beginPath(); ctx.moveTo(2, hy + 4); ctx.lineTo(8, hy + 8); ctx.lineTo(8, hy + 4); ctx.fill();
        } else if (char.state === 'dead') {
            ctx.fillRect(2, hy + 4, 2, 2); ctx.fillRect(6, hy + 8, 2, 2);
        } else {
            ctx.fillRect(4, hy + 6, 4, 4); // Mắt thường to
        }

        // Cằm/Râu Namek
        if (char.raceKey === 'namek') {
            ctx.fillStyle = '#1b5e20';
            this.drawBlock(ctx, -headS/2 - 2, hy + 2, 4, 6, '#1b5e20');
            this.drawBlock(ctx, headS/2 - 2, hy + 2, 4, 6, '#1b5e20');
        }

        // --- 7. TÓC GAI GÓC CỰC LỚN (ĐẶC TRƯNG) ---
        ctx.fillStyle = cHair;
        if (char.raceKey === 'sayan' || char.raceKey === 'earth') {
            // Tạo path vẽ tóc nhọn hoắt như lego block
            ctx.beginPath();
            ctx.moveTo(-headS/2 - 4, hy + headS); // Dưới tai trái
            ctx.lineTo(-headS - 8, hy + 4);
            ctx.lineTo(-headS/2 - 2, hy);
            ctx.lineTo(-headS - 12, hy - 12);
            ctx.lineTo(-headS/4, hy - 8);
            ctx.lineTo(-headS/2, hy - 24); // Đỉnh nhọn cao nhất
            ctx.lineTo(2, hy - 14);
            ctx.lineTo(headS/2 + 6, hy - 28);
            ctx.lineTo(headS/2, hy - 8);
            ctx.lineTo(headS + 12, hy - 16);
            ctx.lineTo(headS, hy);
            ctx.lineTo(headS + 12, hy + 8);
            ctx.lineTo(headS/2 + 4, hy + headS);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // Vẽ vài lọn tóc mái rũ xuống trán
            ctx.beginPath();
            ctx.moveTo(-headS/4, hy); ctx.lineTo(0, hy + 6); ctx.lineTo(headS/4, hy);
            ctx.fill(); ctx.stroke();
        } else if (char instanceof Monster) {
            // Quái vật đầu trọc có sừng
            this.drawBlock(ctx, -headS/4, hy - 10, 4, 10, '#fff');
            this.drawBlock(ctx, headS/4 - 4, hy - 10, 4, 10, '#fff');
        }

        // --- 8. HIỆU ỨNG CHIẾN ĐẤU ---
        if (char.state === 'attack' && !char.isDead) {
            ctx.beginPath(); ctx.arc(25, -char.height / 2, 20, -Math.PI / 2, Math.PI / 4); ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(20, -char.height/2); ctx.lineTo(40, -char.height/2); ctx.strokeStyle = cHair; ctx.stroke();
        }
        ctx.restore();

        // UI trên đầu
        if (!char.isDead && GLOBALS.state === 'PLAYING') {
            ctx.fillStyle = 'white'; ctx.font = '10px "Press Start 2P", monospace'; ctx.textAlign = 'center';
            let nameY = char.y - 15; ctx.fillText(char.name, char.x + char.width / 2, nameY - 5);
            ctx.fillStyle = '#000'; ctx.fillRect(char.x, nameY, char.width, 5);
            ctx.fillStyle = (char instanceof Monster) ? '#d32f2f' : '#4caf50';
            ctx.fillRect(char.x, nameY, char.width * Math.max(0, char.hp / char.maxHp), 5);
        }
    }
};

/* =========================================================================
   [SYSTEM] COMBAT & AI NÂNG CAO (systems/CombatSystem.js)
   ========================================================================= */
const CombatSystem = {
    handleAttack: function(attacker, target, multiplier = 1) {
        if(target.isDead) return;

        // Công thức tính toán
        let isCrit = Math.random() < 0.2; // 20% Chí mạng
        let isMiss = Math.random() < 0.05; // 5% Miss

        if(isMiss) {
            Utils.spawnText(target.x + target.width/2, target.y, "MISS", "#9e9e9e");
            return;
        }

        let dmg = attacker.baseDamage * multiplier + Math.floor(Math.random() * 5);
        if(isCrit) dmg = Math.floor(dmg * 1.5); // Crit x1.5 sát thương

        // Giảm sát thương nếu target có Shield (Namek)
        if(target.skillActive && target.raceKey === 'namek') dmg = Math.max(1, dmg - 10);

        target.hp -= dmg;
        target.hurtTimer = 200; // 0.2s chớp đỏ
        
        // Spawn Text
        Utils.spawnText(target.x + target.width/2, target.y, isCrit ? `${dmg}!` : `-${dmg}`, isCrit ? '#ffea00' : '#ff5252', isCrit);
        Utils.spawnParticles(target.x + target.width/2, target.y + target.height/2, '#ff1744', 5);

        // Knockback nhẹ
        target.vy = -3; target.vx = attacker.dir * 4;

        // Hiệu ứng Màn hình (Chỉ khi Player liên quan)
        if(attacker === GLOBALS.player) {
            if(isCrit) Utils.screenShake(5, 100);
        } else if (target === GLOBALS.player) {
            Utils.screenFlash(); Utils.screenShake(3, 100);
        }

        if(target.hp <= 0) {
            target.hp = 0; target.die();
            if(target instanceof Monster && attacker === GLOBALS.player) {
                attacker.addExp(target.grantExp); attacker.money += target.grantGold;
                // Quest Check
                if (attacker.quest.step === 1) {
                    attacker.quest.progress++;
                    if (attacker.quest.progress >= attacker.quest.target) {
                        attacker.quest.step = 2; UI.showCenterMessage('Nhiệm vụ hoàn thành! Về báo cáo.');
                    }
                    UI.updateQuest();
                }
            }
        }
    }
};

/* =========================================================================
   [ENTITIES] ĐỐI TƯỢNG TRONG GAME (entities/*.js)
   ========================================================================= */
class Entity {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.width = w; this.height = h;
        this.vx = 0; this.vy = 0; this.dir = 1; this.isGrounded = false;
        
        this.state = 'idle'; // Dùng cho Animation
        this.animFrame = 0; this.animTimer = 0;
    }
    update(dt) {
        this.vy += CONFIG.gravity; if (this.vy > CONFIG.maxFall) this.vy = CONFIG.maxFall;
        this.x += this.vx; this.y += this.vy;
        
        if (this.y + this.height > GLOBALS.groundY) { this.y = GLOBALS.groundY - this.height; this.vy = 0; this.isGrounded = true; } 
        else { this.isGrounded = false; }
        
        if (this.x < 0) this.x = 0;
        let mw = MapManager.maps[MapManager.currentId].width;
        if (this.x > mw - this.width) this.x = mw - this.width;
        
        this.vx *= CONFIG.friction; if (Math.abs(this.vx) < 0.1) this.vx = 0;
        
        AnimationManager.updateState(this, dt);
    }
}

class Player extends Entity {
    constructor(x, y, name, raceKey) {
        super(x, y, 40, 50);
        this.name = name; this.raceKey = raceKey;
        this.raceConfig = CONFIG.races[raceKey];
        
        this.maxHp = this.raceConfig.maxHp; this.hp = this.maxHp;
        this.maxMp = this.raceConfig.maxMp; this.mp = this.maxMp;
        this.speed = this.raceConfig.speed; this.jumpForce = this.raceConfig.jumpForce;
        this.baseDamage = this.raceConfig.baseDamage; this.maxExp = this.raceConfig.maxExp;
        this.colors = this.raceConfig.colors;
        
        this.level = 1; this.exp = 0; this.money = 0; this.isDead = false; this.hurtTimer = 0;
        this.inventory = [{ id: 'hp_potion', name: 'Bình Máu', desc: 'Hồi 50 HP', count: 5 }];
        this.quest = { step: 0, progress: 0, target: 3 };
        
        this.cooldowns = { attack: 0, shoot: 0, skill: 0 };
        this.skillActive = false; this.skillTimer = 0;
    }

    addExp(amt) {
        this.exp += amt; UI.chatSys(`Nhận ${amt} EXP`);
        if (this.exp >= this.maxExp) {
            this.level++; this.exp -= this.maxExp;
            this.maxExp = Math.floor(this.maxExp * this.raceConfig.levelGrowth.expFactor);
            this.maxHp += this.raceConfig.levelGrowth.hp; this.maxMp += this.raceConfig.levelGrowth.mp;
            this.baseDamage += this.raceConfig.levelGrowth.damage;
            this.hp = this.maxHp; this.mp = this.maxMp;
            UI.showCenterMessage(`LÊN CẤP ${this.level}!`); Utils.spawnParticles(this.x+20, this.y+50, '#ffeb3b', 40);
        }
        UI.updateHUD();
    }

    die() { this.isDead = true; this.state = 'dead'; this.vx = 0; if(this === GLOBALS.player) document.getElementById('respawnScreen').style.display = 'flex'; }
    takeDamage(dmg) { if(!this.isDead) CombatSystem.handleAttack(this /*dummy*/, this, dmg); } // Bị đấm

    update(dt) {
        if(this.isDead) return super.update(dt);
        
        super.update(dt);
        for(let k in this.cooldowns) if(this.cooldowns[k] > 0) this.cooldowns[k] -= dt;
        
        if (this.skillTimer > 0) {
            this.skillTimer -= dt;
            if (this.skillTimer <= 0 && this.skillActive) {
                this.skillActive = false;
                if (this.raceKey === 'sayan') this.baseDamage -= 10;
                else if (this.raceKey === 'earth') this.speed -= 2.5;
                if(this === GLOBALS.player) UI.chatSys('Hết thời gian kỹ năng.');
            }
        }
        
        if (this.state !== 'attack' && this.state !== 'shoot') {
            if (!this.isGrounded) this.state = 'jump';
            else if (Math.abs(this.vx) > 0.5) this.state = 'run';
            else this.state = 'idle';
        }
    }

    actionAttack() {
        if (this.cooldowns.attack > 0 || this.isDead) return;
        this.state = 'attack'; this.animFrame = 0; this.cooldowns.attack = 500;
        let hitbox = { x: this.dir===1 ? this.x+this.width : this.x-30, y: this.y, width: 30, height: this.height };
        
        GLOBALS.entities.forEach(ent => {
            if (ent !== this && !ent.isDead && ent.hp !== undefined && !(ent instanceof NPC)) {
                if (Utils.checkAABB(hitbox, ent)) CombatSystem.handleAttack(this, ent, 1);
            }
        });
    }

    actionShoot() {
        if (this.cooldowns.shoot > 0 || this.mp < this.raceConfig.skill.cost || this.isDead) return;
        this.mp -= this.raceConfig.skill.cost;
        this.state = 'shoot'; this.animFrame = 0; this.cooldowns.shoot = 800;
        GLOBALS.projectiles.push(new Projectile(this.dir===1 ? this.x+this.width : this.x-20, this.y+15, this.dir, this, this.baseDamage * 1.2));
        UI.updateHUD();
    }

    actionSkill() {
        if (this.cooldowns.skill > 0 || this.skillActive || this.isDead) return;
        this.cooldowns.skill = this.raceConfig.skill.cd;
        this.skillTimer = this.raceConfig.skill.duration; this.skillActive = true;
        
        if (this.raceKey === 'sayan') {
            this.baseDamage += 10; Utils.spawnParticles(this.x+20, this.y+25, '#ff9800', 30); UI.chatSys('Thịnh nộ Sayan kích hoạt!');
        } else if (this.raceKey === 'namek') {
            this.hp = Math.min(this.maxHp, this.hp + 50); Utils.spawnParticles(this.x+20, this.y+25, '#4caf50', 20); UI.chatSys('Namek hồi máu và tạo Khiên!');
        } else if (this.raceKey === 'earth') {
            this.speed += 2.5; Utils.spawnParticles(this.x+20, this.y+25, '#2196f3', 20); UI.chatSys('Trái Đất bức tốc!');
        }
    }

    draw(ctx) { CharacterRenderer.draw(ctx, this); }
}

class Monster extends Entity {
    constructor(x, y, level) {
        super(x, y, 40, 50);
        this.name = `Quái Cấp ${level}`; this.level = level;
        this.maxHp = 60 * level; this.hp = this.maxHp; this.baseDamage = 12 * level;
        this.grantExp = 25 * level; this.grantGold = 15 * level;
        this.colors = { body: '#7b1fa2', skin: '#ab47bc', hair: '#fff' };
        this.originX = x; this.isDead = false; this.hurtTimer = 0;
        
        // FSM Variables
        this.aiState = 'IDLE'; this.stateTimer = 0; this.attackCooldown = 0;
        this.aggroRange = 250; this.attackRange = 45;
    }

    die() { this.isDead = true; this.state = 'dead'; this.aiState = 'RESPAWNING'; this.stateTimer = 0; }
    takeDamage(dmg) { /* Bị gọi qua CombatSystem rồi */ }

    update(dt) {
        super.update(dt);
        if(this.hurtTimer > 0) this.hurtTimer -= dt;
        if(this.attackCooldown > 0) this.attackCooldown -= dt;

        // QUÁI VẬT AI (FSM Nâng Cao)
        switch(this.aiState) {
            case 'RESPAWNING':
                this.stateTimer += dt;
                if(this.stateTimer > 8000) { // Hồi sinh 8s
                    this.hp = this.maxHp; this.isDead = false; this.x = this.originX;
                    this.aiState = 'IDLE'; this.state = 'idle';
                }
                break;
                
            case 'IDLE':
                this.vx = 0; this.stateTimer += dt;
                if(this.stateTimer > 2000) { this.aiState = 'PATROL'; this.stateTimer = 0; }
                this.checkAggro();
                break;

            case 'PATROL':
                this.stateTimer += dt;
                if(this.stateTimer === dt) { this.dir = Math.random()>0.5 ? 1 : -1; } // Mới vào patrol thì chọn hướng
                this.vx = this.dir * 1.5;
                if(this.stateTimer > 2000 || Math.abs(this.x - this.originX) > 300) { this.aiState = 'IDLE'; this.stateTimer = 0; }
                this.checkAggro();
                break;

            case 'CHASE':
                if(!GLOBALS.player || GLOBALS.player.isDead) { this.aiState = 'RETURN'; break; }
                let dist = Math.abs(this.x - GLOBALS.player.x);
                this.dir = this.x < GLOBALS.player.x ? 1 : -1;
                
                if (dist > this.aggroRange * 1.5) this.aiState = 'RETURN'; // Chạy xa quá bỏ cuộc
                else if (dist > this.attackRange) this.vx = this.dir * 2.5; // Chạy theo
                else { this.vx = 0; this.aiState = 'ATTACK'; } // Tới nơi thì đánh
                break;

            case 'ATTACK':
                if(this.attackCooldown <= 0 && GLOBALS.player && !GLOBALS.player.isDead) {
                    this.state = 'attack'; this.animFrame = 0; this.attackCooldown = 1500;
                    CombatSystem.handleAttack(this, GLOBALS.player, 1);
                    UI.updateHUD();
                }
                if(this.state !== 'attack') this.aiState = 'CHASE'; // Xong attack quay lại rượt
                break;

            case 'RETURN':
                let returnDist = Math.abs(this.x - this.originX);
                if (returnDist < 10) { this.vx = 0; this.aiState = 'IDLE'; }
                else { this.dir = this.x > this.originX ? -1 : 1; this.vx = this.dir * 2; }
                this.checkAggro(); // Trên đường về nếu thấy lại quay ra cắn tiếp
                break;
        }

        // Logic Animation Mapping (Khớp FSM với Draw State)
        if(this.aiState === 'IDLE' || this.aiState === 'RETURN' && this.vx===0) this.state = 'idle';
        else if(this.aiState === 'PATROL' || this.aiState === 'CHASE' || this.aiState === 'RETURN') this.state = 'run';
    }

    checkAggro() {
        if(!GLOBALS.player || GLOBALS.player.isDead) return;
        if(Math.abs(this.x - GLOBALS.player.x) < this.aggroRange && Math.abs(this.y - GLOBALS.player.y) < 100) this.aiState = 'CHASE';
    }

    draw(ctx) { CharacterRenderer.draw(ctx, this); }
}

class NPC extends Entity {
    constructor(x, y) {
        super(x, y, 40, 50);
        this.name = 'Trưởng Làng'; this.colors = { body: '#ff9800', skin: '#ffcc80', hair: '#e65100' };
        this.dialogTimer = 0; this.dialogText = '';
    }
    talkTo(p) {
        if(p.quest.step===0) { this.showDialog('Giết 3 quái ngoài rừng!'); p.quest.step=1; p.quest.progress=0; }
        else if(p.quest.step===1) this.showDialog(`Đã diệt: ${p.quest.progress}/3`);
        else if(p.quest.step===2) { this.showDialog('Thưởng 100EXP, 500 Vàng!'); p.addExp(100); p.money+=500; p.quest.step=3; }
        else this.showDialog('Làng bình yên rồi.');
        UI.updateQuest();
    }
    showDialog(t) { this.dialogText = t; this.dialogTimer = 4000; }
    update(dt) { super.update(dt); if (this.dialogTimer > 0) this.dialogTimer -= dt; }
    draw(ctx) {
        CharacterRenderer.draw(ctx, this);
        if (this.dialogTimer > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.beginPath(); ctx.roundRect(this.x - 50, this.y - 65, 140, 35, 4); ctx.fill();
            ctx.fillStyle = 'black'; ctx.font = 'bold 10px Roboto'; ctx.textAlign = 'center'; ctx.fillText(this.dialogText.substring(0, 22), this.x + 20, this.y - 50);
        }
    }
}

class Projectile {
    constructor(x, y, dir, owner, damage) {
        this.x = x; this.y = y; this.width = 16; this.height = 8;
        this.vx = dir * 12; this.dir = dir; this.owner = owner; this.damage = damage; this.life = 800;
        this.color = owner.colors.proj || '#ffeb3b';
    }
    update(dt) {
        this.x += this.vx; this.life -= dt;
        if (Math.random() > 0.4) Utils.spawnParticles(this.x, this.y + 4, this.color, 1);
        
        GLOBALS.entities.forEach(ent => {
            if (ent !== this.owner && ent.hp !== undefined && !ent.isDead && !(ent instanceof NPC)) {
                if (Utils.checkAABB(this, ent)) {
                    CombatSystem.handleAttack(this.owner, ent, 1.2); // Đạn mạnh hơn đánh thường 20%
                    Utils.spawnParticles(this.x, this.y, this.color, 15);
                    this.life = 0;
                }
            }
        });
    }
    draw(ctx) {
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.roundRect(this.x, this.y, this.width, this.height, 4); ctx.fill();
        ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fill(); ctx.shadowBlur = 0;
    }
}

/* =========================================================================
   [SYSTEM] LƯU TRỮ (systems/SaveSystem.js)
   ========================================================================= */
const SaveSystem = {
    save: function() {
        if(!GLOBALS.player) return;
        let data = {
            name: GLOBALS.player.name, race: GLOBALS.player.raceKey, level: GLOBALS.player.level,
            exp: GLOBALS.player.exp, hp: GLOBALS.player.hp, mp: GLOBALS.player.mp, money: GLOBALS.player.money,
            map: MapManager.currentId, x: GLOBALS.player.x, y: GLOBALS.player.y, quest: GLOBALS.player.quest
        };
        localStorage.setItem('aura_save', JSON.stringify(data));
        UI.chatSys('Đã lưu game!');
    },
    load: function() {
        let raw = localStorage.getItem('aura_save');
        if(!raw) return null;
        return JSON.parse(raw);
    }
}

/* =========================================================================
   [SYSTEM] UI & SỰ KIỆN (ui/UIManager.js)
   ========================================================================= */
const UI = {
    updateHUD: function() {
        let p = GLOBALS.player; if(!p) return;
        document.getElementById('hudName').innerText = p.name; document.getElementById('hudLevel').innerText = p.level;
        document.getElementById('hudHpText').innerText = `${Math.floor(p.hp)}/${p.maxHp}`; document.getElementById('hpBar').style.width = `${Math.max(0, p.hp/p.maxHp*100)}%`;
        document.getElementById('hudMpText').innerText = `${Math.floor(p.mp)}/${p.maxMp}`; document.getElementById('mpBar').style.width = `${Math.max(0, p.mp/p.maxMp*100)}%`;
        document.getElementById('expBar').style.width = `${(p.exp/p.maxExp)*100}%`; document.getElementById('hudMoney').innerText = p.money;
    },
    updateQuest: function() {
        let q = GLOBALS.player.quest; let txt = document.getElementById('questText');
        if(q.step===0) txt.innerText='Nói chuyện Trưởng Làng'; else if(q.step===1) txt.innerText=`Diệt Quái: ${q.progress}/${q.target}`;
        else if(q.step===2) txt.innerText='Về báo cáo'; else txt.innerText='Đã xong nhiệm vụ';
    },
    chatSys: function(msg) {
        let box = document.getElementById('chatMessages'); let el = document.createElement('div'); el.className='msg-sys'; el.innerText=`[HT] ${msg}`;
        box.appendChild(el); box.scrollTop = box.scrollHeight;
    },
    showCenterMessage: function(msg) {
        let el = document.getElementById('systemMessage'); el.innerText = msg; el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 2000);
    },
    toggleInventory: function() {
        let inv = document.getElementById('inventory');
        if (inv.style.display === 'block') inv.style.display = 'none';
        else {
            inv.style.display = 'block'; let grid = document.getElementById('invGrid'); grid.innerHTML = '';
            GLOBALS.player.inventory.forEach(item => {
                if (item.count > 0) {
                    let slot = document.createElement('div'); slot.className = 'item-slot'; slot.onclick = () => GLOBALS.player.useItem(item.id);
                    if (item.id === 'hp_potion') { let icon = document.createElement('div'); icon.className = 'item-icon-hp'; slot.appendChild(icon); }
                    let cnt = document.createElement('div'); cnt.className = 'item-count'; cnt.innerText = item.count; slot.appendChild(cnt);
                    let tt = document.createElement('span'); tooltip.className = 'tooltip'; tooltip.innerText = `${item.name}: ${item.desc}`; slot.appendChild(tooltip);
                    grid.appendChild(slot);
                }
            });
            for (let i = GLOBALS.player.inventory.length; i < 12; i++) { let slot = document.createElement('div'); slot.className = 'item-slot'; grid.appendChild(slot); }
        }
    }
};

/* =========================================================================
   [SYSTEM] MẠNG GIẢ LẬP (network/MockNetwork.js)
   ========================================================================= */
class MockNetwork {
    constructor() { this.bots = []; setTimeout(() => { let b=new Player(600,300,'GokuFake','sayan'); b.isBot=true; GLOBALS.entities.push(b); this.bots.push(b); UI.chatSys('GokuFake online.'); }, 3000); }
    update(dt) { this.bots.forEach(b => { if(Math.random()<0.01) { b.dir = Math.random()>0.5?1:-1; b.vx=b.dir*b.speed; } else if(Math.random()<0.02) b.vx=0; if(Math.random()<0.005 && b.isGrounded) b.vy=b.jumpForce; }); }
    sendChat(name, msg) { let box=document.getElementById('chatMessages'); let el=document.createElement('div'); el.className='msg-player'; let span=document.createElement('span'); span.className='msg-name'; span.textContent=name+': '; el.appendChild(span); el.appendChild(document.createTextNode(msg)); box.appendChild(el); box.scrollTop=box.scrollHeight; }
}

/* =========================================================================
   [CORE] VÒNG LẶP CHÍNH & KHỞI TẠO (src/main.js)
   ========================================================================= */
const GameCore = {
    init: function() {
        document.getElementById('playerRaceInput').addEventListener('change', this.updatePreview);
        this.updatePreview();
        
        window.addEventListener('keydown', e => {
            if(GLOBALS.state === 'LOGIN' && e.key === 'Enter') this.startNewGame();
            if(GLOBALS.state !== 'PLAYING') return;
            if(e.key === 'Enter') {
                if(GLOBALS.isChatFocused) { let i = document.getElementById('chatInput'); if(i.value.trim() && GLOBALS.network) GLOBALS.network.sendChat(GLOBALS.player.name, i.value.trim()); i.value=''; i.blur(); } 
                else document.getElementById('chatInput').focus();
                return;
            }
            if(GLOBALS.isChatFocused) return;
            GLOBALS.keys[e.code] = true;
            
            let p = GLOBALS.player; if(p.isDead) return;
            if(e.code === 'KeyW') { if(p.isGrounded) p.vy = p.jumpForce; MapManager.checkPortals(); }
            if(e.code === 'KeyJ') p.actionAttack();
            if(e.code === 'KeyK') p.actionShoot();
            if(e.code === 'KeyQ') p.actionSkill();
            if(e.code === 'KeyE') { let npc = GLOBALS.entities.find(e => e instanceof NPC && Math.abs(e.x-p.x)<100); if(npc) npc.talkTo(p); }
            if(e.code === 'KeyI') UI.toggleInventory();
        });
        window.addEventListener('keyup', e => GLOBALS.keys[e.code] = false);
        document.getElementById('chatInput').addEventListener('focus', () => GLOBALS.isChatFocused = true);
        document.getElementById('chatInput').addEventListener('blur', () => GLOBALS.isChatFocused = false);

        // Auto Save Interval
        setInterval(() => { if(GLOBALS.state==='PLAYING') SaveSystem.save(); }, 60000); // Lưu mỗi phút

        requestAnimationFrame(this.loop.bind(this));
    },

    updatePreview: function() {
        let race = document.getElementById('playerRaceInput').value; let c = CONFIG.races[race];
        document.getElementById('racePreviewName').innerText = c.title; document.getElementById('raceHp').innerText = c.maxHp; document.getElementById('raceMp').innerText = c.maxMp;
        document.getElementById('raceDamage').innerText = c.baseDamage; document.getElementById('raceSpeed').innerText = c.speed;
        document.getElementById('racePreviewSkillName').innerText = c.skill.name;
        GLOBALS.previewPlayer = new Player(30, 60, '', race);
    },

    startNewGame: function() {
        let name = document.getElementById('playerNameInput').value || 'Gamer';
        GLOBALS.player = new Player(200, GLOBALS.groundY-100, name, document.getElementById('playerRaceInput').value);
        this.enterWorld('village', 200);
    },

    loadGame: function() {
        let data = SaveSystem.load();
        if(!data) { alert('Không tìm thấy file save!'); return; }
        GLOBALS.player = new Player(data.x, data.y, data.name, data.race);
        GLOBALS.player.level = data.level; GLOBALS.player.exp = data.exp; GLOBALS.player.money = data.money; GLOBALS.player.quest = data.quest;
        // Tính toán lại max stat theo level
        for(let i=1; i<data.level; i++) {
            GLOBALS.player.maxHp += GLOBALS.player.raceConfig.levelGrowth.hp; GLOBALS.player.maxMp += GLOBALS.player.raceConfig.levelGrowth.mp;
            GLOBALS.player.baseDamage += GLOBALS.player.raceConfig.levelGrowth.damage; GLOBALS.player.maxExp = Math.floor(GLOBALS.player.maxExp * GLOBALS.player.raceConfig.levelGrowth.expFactor);
        }
        GLOBALS.player.hp = data.hp; GLOBALS.player.mp = data.mp;
        this.enterWorld(data.map, data.x);
        UI.chatSys('Đã tải lại game thành công!');
    },

    enterWorld: function(mapId, spawnX) {
        if(!GLOBALS.network) GLOBALS.network = new MockNetwork();
        document.getElementById('loginScreen').style.display = 'none'; document.getElementById('hud').style.display = 'block';
        GLOBALS.state = 'PLAYING'; GLOBALS.entities.push(GLOBALS.player);
        MapManager.loadMap(mapId, spawnX); UI.updateHUD(); UI.updateQuest(); GLOBALS.lastTime = performance.now();
    },

    respawnPlayer: function() {
        document.getElementById('respawnScreen').style.display = 'none';
        GLOBALS.player.hp = GLOBALS.player.maxHp; GLOBALS.player.mp = GLOBALS.player.maxMp; GLOBALS.player.isDead = false; GLOBALS.player.state = 'idle';
        this.enterWorld('village', 200); // Hồi sinh ở làng
    },

    loop: function(timestamp) {
        let dt = timestamp - GLOBALS.lastTime; if(dt > 50) dt = 50; GLOBALS.lastTime = timestamp;

        if (GLOBALS.state === 'LOGIN') {
            let pCtx = document.getElementById('previewCanvas').getContext('2d'); pCtx.clearRect(0,0,100,100);
            if(GLOBALS.previewPlayer) { GLOBALS.previewPlayer.skillActive = (Math.floor(timestamp/1000)%3===0); CharacterRenderer.draw(pCtx, GLOBALS.previewPlayer); }
            requestAnimationFrame(this.loop.bind(this)); return;
        }

        if (GLOBALS.state === 'PLAYING' && !GLOBALS.player.isDead && !GLOBALS.isChatFocused) {
            if(GLOBALS.keys['KeyA']) { GLOBALS.player.vx = -GLOBALS.player.speed; GLOBALS.player.dir = -1; }
            else if(GLOBALS.keys['KeyD']) { GLOBALS.player.vx = GLOBALS.player.speed; GLOBALS.player.dir = 1; }
        }
        if(!GLOBALS.player.isDead && GLOBALS.player.mp < GLOBALS.player.maxMp) GLOBALS.player.mp += 0.05;

        // Cập nhật thực thể
        GLOBALS.entities.forEach(e => e.update(dt));
        GLOBALS.projectiles = GLOBALS.projectiles.filter(p => p.life>0); GLOBALS.projectiles.forEach(p => p.update(dt));
        GLOBALS.particles = GLOBALS.particles.filter(p => p.life>0); GLOBALS.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life--; p.vy+=CONFIG.gravity*0.2; });
        GLOBALS.texts = GLOBALS.texts.filter(t => t.life>0); GLOBALS.texts.forEach(t => { t.y+=t.vy; t.life--; if(t.isCrit) t.vy *= 0.9; });
        if(GLOBALS.network) GLOBALS.network.update(dt);

        // Camera Logic (với Rung màn hình)
        GLOBALS.camera.x = GLOBALS.player.x - GLOBALS.width/2 + GLOBALS.player.width/2;
        if(GLOBALS.camera.x < 0) GLOBALS.camera.x = 0;
        if(GLOBALS.camera.x > MapManager.maps[MapManager.currentId].width - GLOBALS.width) GLOBALS.camera.x = MapManager.maps[MapManager.currentId].width - GLOBALS.width;
        
        let shakeOffX = 0, shakeOffY = 0;
        if(GLOBALS.camera.shakeTime > 0) {
            GLOBALS.camera.shakeTime -= dt;
            shakeOffX = Utils.rand(-GLOBALS.camera.shakeIntensity, GLOBALS.camera.shakeIntensity);
            shakeOffY = Utils.rand(-GLOBALS.camera.shakeIntensity, GLOBALS.camera.shakeIntensity);
        }

        // RENDER TẤT CẢ
        GLOBALS.ctx.clearRect(0,0,GLOBALS.width, GLOBALS.height);
        GLOBALS.ctx.save();
        GLOBALS.ctx.translate(shakeOffX, shakeOffY); // Áp dụng rung màn hình
        
        MapManager.drawBackground(GLOBALS.ctx, GLOBALS.camera.x, GLOBALS.camera.y);
        
        GLOBALS.ctx.save(); GLOBALS.ctx.translate(-GLOBALS.camera.x, -GLOBALS.camera.y);
        GLOBALS.entities.sort((a,b)=>a.y-b.y).forEach(e => e.draw(GLOBALS.ctx));
        GLOBALS.projectiles.forEach(p => p.draw(GLOBALS.ctx));
        
        GLOBALS.particles.forEach(p => { GLOBALS.ctx.fillStyle=p.color; GLOBALS.ctx.globalAlpha=p.life/30; GLOBALS.ctx.beginPath(); GLOBALS.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); GLOBALS.ctx.fill(); GLOBALS.ctx.globalAlpha=1; });
        
        GLOBALS.ctx.font = 'bold 16px "Press Start 2P", monospace';
        GLOBALS.texts.forEach(t => { GLOBALS.ctx.fillStyle=t.color; GLOBALS.ctx.globalAlpha=t.life/t.maxLife; GLOBALS.ctx.font = t.isCrit ? 'bold 20px "Press Start 2P"' : 'bold 14px "Press Start 2P"'; GLOBALS.ctx.fillText(t.text, t.x, t.y); GLOBALS.ctx.globalAlpha=1; });
        
        GLOBALS.ctx.restore();
        GLOBALS.ctx.restore(); // Restore shake
        
        if(GLOBALS.player.isDead) UI.updateHUD(); // Giữ UI khi chết
        requestAnimationFrame(this.loop.bind(this));
    }
};

// Start Engine
GameCore.init();

</script>
</body>
</html>
